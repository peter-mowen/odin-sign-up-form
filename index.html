<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Odin Sign-up Form</title>
</head>
<body>
  <div class="image-sidebar-container">
    <div class="logo-container">
      <div class="logo-bar">
        <img class="logo-image" src="img/odin-lined.png" alt="The Odin Project's logo">
        <span class="logo-text">Odin</span>
      </div>
    </div>
    <div class="background-image-credit-container">
      <p class="background-image-credit">
        Photo by
        <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a>
        on
        <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>
  </div>
  <div class="main-content-container">
    <div class="header">
      <p>
        This is not a real online service! You know you need something like
        this in your life to help you realize your deepest dreams.<br>
        Sign up <em>now</em> to get started
        <br>
        <br>
        You <em>know</em> you want to.
      </p>
    </div>
    <div class="sign-up-form">
      <h2>Let's do this!</h2>
      <form action="">
        <section>
          <div class="form-row">
            <div class="form-field">
              <label for="first-name">First Name</label>
              <input type="text" name="first-name" id="first-name" value="Thor">
            </div>
            <div class="form-field">
              <label for="last-name">Last Name</label>
              <input type="text" name="last-name" id="last-name" value="Odinson">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="email">Email</label>
              <input type="email" name="email" id="email">
            </div>
            <div class="form-field">
              <label for="phone-number">Phone Number</label>
              <input type="tel" name="phone-number" id="phone-number">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="password">Password</label>
              <input type="password" name="password" id="password">
            </div>
            <div class="form-field">
              <label for="confirm-password">Confirm Password</label>
              <input type="confirm-password" name="confirm-password" id="confirm-password">
            </div>
          </div>
        </section>
        <button>Create Account</button>
      </form>
    </div>
    <div class="footer">
      <p>
        Already have an account? <a href="">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
